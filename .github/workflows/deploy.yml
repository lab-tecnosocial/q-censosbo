name: Release y sitio

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # crear el GitHub Release y subirle el ZIP
  pages: write      # publicar en GitHub Pages
  id-token: write

# Encola los despliegues en vez de cancelarlos: no aborta un release a medias.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) Solo en tags v*: empaqueta el plugin y lo publica como asset del Release.
  #    El ZIP vive en el Release (URL estable), no en Pages, así no se cae al
  #    redesplegar el sitio.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Empaquetar plugin
        run: python scripts/build_release.py --zip-only
      - name: Crear Release y subir el ZIP
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/qcensosbo.zip \
            --title "$GITHUB_REF_NAME" --generate-notes

  # 2) Siempre: genera plugins.xml (download_url → asset del último release) y el
  #    sitio. Espera al job 'release' para que el asset exista antes de publicar
  #    el manifiesto que lo referencia.
  pages:
    needs: [release]
    if: ${{ !cancelled() && (needs.release.result == 'success' || needs.release.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Instalar MkDocs Material
        run: pip install mkdocs-material
      - name: Generar plugins.xml
        run: |
          python scripts/build_release.py --xml-only
          cp dist/plugins.xml docs/
      - name: Construir el sitio
        run: mkdocs build --site-dir site
      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: [pages]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
