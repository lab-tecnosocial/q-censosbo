name: Sitio y plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Instalar MkDocs Material
        run: pip install mkdocs-material

      - name: Construir el sitio
        run: mkdocs build --site-dir site

      # El ZIP solo se incluye en Pages cuando hay un tag de versión.
      # Así el ZIP publicado siempre corresponde a una versión real, no a commits intermedios.
      - name: Empaquetar plugin (solo en tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python scripts/build_release.py
          cp dist/qcensosbo.zip dist/plugins.xml site/

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
