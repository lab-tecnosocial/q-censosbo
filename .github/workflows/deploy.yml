name: Sitio

# Reconstruye el sitio de documentación (MkDocs) y lo publica en Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

# Pages despliega por artefacto y reemplaza el sitio completo en cada deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Instalar MkDocs Material
        run: pip install mkdocs-material
      - name: Construir el sitio
        run: mkdocs build --site-dir site
      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: [pages]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
