name: Sitio y plugin

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Instalar MkDocs Material
        run: pip install mkdocs-material

      # El ZIP se construye antes de mkdocs para que MkDocs lo incluya como asset estático.
      # En push a main sin tag, este paso se salta y el ZIP del release anterior permanece en Pages.
      - name: Empaquetar plugin (solo en tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python scripts/build_release.py
          cp dist/qcensosbo.zip dist/plugins.xml docs/

      - name: Construir el sitio
        run: mkdocs build --site-dir site

      - name: Limpiar ZIPs copiados a docs/ (no deben commitearse)
        if: startsWith(github.ref, 'refs/tags/v')
        run: rm -f docs/qcensosbo.zip docs/plugins.xml

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
