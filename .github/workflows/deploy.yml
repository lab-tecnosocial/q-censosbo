name: Sitio y manifiesto

# Reconstruye docs + plugins.xml y los publica en Pages. plugins.xml apunta su
# download_url al asset del Release de la versión en metadata.txt (siempre el
# último release), así que cualquier deploy produce un manifiesto válido.
on:
  push:
    branches: [main]
  release:
    types: [published]   # tras crear un Release (release.yml), redespliega con el asset ya disponible
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

# Los deploys se encolan; como todos producen el mismo plugins.xml, da igual cuál
# gane la cola. El Release lo crea release.yml, que no comparte este grupo.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Instalar MkDocs Material
        run: pip install mkdocs-material
      - name: Generar plugins.xml
        run: |
          python scripts/build_release.py --xml-only
          cp dist/plugins.xml docs/
      - name: Construir el sitio
        run: mkdocs build --site-dir site
      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: [pages]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
