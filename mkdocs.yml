site_name: Q-CensosBo
site_description: Plugin de QGIS para explorar y mapear los microdatos de los censos de Bolivia
site_url: https://lab-tecnosocial.github.io/q-censosbo/
repo_url: https://github.com/lab-tecnosocial/q-censosbo
repo_name: lab-tecnosocial/q-censosbo
copyright: Lab Tecnosocial · GPL-3.0

theme:
  name: material
  language: es
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Inicio: index.md
  - Instalación: instalacion.md
  - Uso: uso.md
  - Datos: datos.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
